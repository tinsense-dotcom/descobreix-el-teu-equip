<!DOCTYPE html><html lang='ca'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Equip</title><style>body{font-family:Arial;background:#6fb6ff;display:flex;justify-content:center;align-items:center;height:100vh;margin:0}.card{background:#fff;padding:30px;border-radius:16px;max-width:420px;width:90%;text-align:center}input{width:100%;padding:12px}button{margin-top:15px;padding:12px 20px}.green{color:green}.red{color:red}.orange{color:orange}#loading,#result{display:none}</style></head><body><div class='card'><div id='form'><h1>🎁 Descobreix el teu equip</h1><input id='name' placeholder='Nom i cognom'><button onclick='go()'>Descobrir</button></div><div id='loading'><h2>⏳ Preparant el teu equip...</h2></div><div id='result'></div></div><script>const e={'gerard civil':['💚','EQUIP VERD','green'],'monica gilabert':['💚','EQUIP VERD','green'],'tania insense':['💚','EQUIP VERD','green'],'alex nuevo':['💚','EQUIP VERD','green'],'xavi caneque':['❤️','EQUIP VERMELL','red'],'xavi cañeque':['❤️','EQUIP VERMELL','red'],'natalia rodriguez':['❤️','EQUIP VERMELL','red'],'sheila faro':['❤️','EQUIP VERMELL','red'],'sonia garcia':['❤️','EQUIP VERMELL','red'],'ceci cruciani':['🧡','EQUIP TARONJA','orange'],'mar pamia':['🧡','EQUIP TARONJA','orange'],'barbara adell':['🧡','EQUIP TARONJA','orange'],'alba vilatersana':['🧡','EQUIP TARONJA','orange']};function n(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim()}function go(){let raw=name.value.trim();form.style.display='none';loading.style.display='block';setTimeout(()=>{loading.style.display='none';let r=e[n(raw)];result.style.display='block';if(r){result.innerHTML='<h1>🎉 Enhorabona!</h1><h2>Hola '+raw+'!</h2><h1 class='+r[2]+'>'+r[0]+' '+r[1]+'</h1>'}else{result.innerHTML='<h2>Nom no trobat</h2><button onclick=location.reload()>Torna</button>'}},3000)}</script></body></html>
