<!DOCTYPE html>
<html lang="ca">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descobreix el teu equip</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #74b9ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            width: 420px;
            max-width: 90%;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .2);
        }

        input {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            margin-top: 20px;
            padding: 15px;
            width: 100%;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            background: #2f80ed;
            color: white;
        }

        button:hover {
            background: #1d6fe3;
        }
    </style>

</head>

<body>

<div class="card" id="pantallaInicial">

    <h1>🎁 Descobreix el teu equip</h1>

    <p>Escriu el teu nom.</p>

    <input id="nom" placeholder="Nom i cognom">

    <button onclick="descobrirEquip()">
        Descobrir
    </button>

</div>


<div id="pantallaCarrega" style="display:none;">

    <div class="card">

        <h1>⏳</h1>

        <h2>Preparant el teu equip...</h2>

        <p id="loadingText">
            Verificant participant...
        </p>

    </div>

</div>


<div id="pantallaFinal" style="display:none;">

    <div class="card">

        <h1>🎉</h1>

        <h2>Enhorabona!</h2>

        <h1 id="equipFinal"></h1>

        <p id="missatgeFinal"></p>

    </div>

</div>

<script>

const equipVerd = [
"gerard","civil",
"monica","gilabert",
"tania","insense",
"alex","nuevo"
];

const equipVermell = [
"xavi","caneque","cañeque",
"natalia","nat",
"sheila",
"sonia","sònia","garcia"
];

const equipTaronja = [
"ceci","cruciani",
"mar","pamia",
"barbara","bàrbara","adell",
"alba","vilatersana"
];

function descobrirEquip(){

    document.getElementById("pantallaInicial").style.display="none";

    document.getElementById("pantallaCarrega").style.display="block";

    const textos=[
        "Verificant participant...",
        "Analitzant dades...",
        "Equilibrant equips...",
        "Preparant sorpresa..."
    ];

    let i=0;

    const interval=setInterval(function(){

        document.getElementById("loadingText").innerHTML=textos[i];

        i++;

        if(i>=textos.length){

            clearInterval(interval);

        }

    },1000);

    setTimeout(function(){

        document.getElementById("pantallaCarrega").style.display="none";

    const nom = document
.getElementById("nom")
.value
.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"");

let color = "black";
let equip = "";
let missatge = "";

if (equipVerd.some(x => nom.includes(x))) {

    color = "green";
    equip = "💚 EQUIP VERD";
    missatge = "Ara busca la resta dels membres del teu equip i prepara't per començar!";

}
else if (equipVermell.some(x => nom.includes(x))) {

    color = "red";
    equip = "❤️ EQUIP VERMELL";
    missatge = "Ara busca la resta dels membres del teu equip i prepara't per començar!";

}
else if (equipTaronja.some(x => nom.includes(x))) {

    color = "orange";
    equip = "🧡 EQUIP TARONJA";
    missatge = "Ara busca la resta dels membres del teu equip i prepara't per començar!";

}
else {

    color = "black";
    equip = "❓ NOM NO TROBAT";
    missatge = "Comprova que hagis escrit el teu nom correctament.";

}

document.getElementById("equipFinal").innerHTML = equip;

document.getElementById("equipFinal").style.color = color;

document.getElementById("missatgeFinal").innerHTML = missatge;

// Amaguem la pantalla de càrrega
document.getElementById("pantallaCarrega").style.display = "none";

// Mostrem la pantalla final
document.getElementById("pantallaFinal").style.display = "block";

    },4000);

}

</script>

</body>

</html>
