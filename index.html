<!DOCTYPE html> <html lang="ca"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Descobreix el teu equip</title> <style> body{ margin:0; font-family:Arial,sans-serif; background:#74b9ff; display:flex; justify-content:center; align-items:center; height:100vh; } .card{ background:white; width:420px; max-width:90%; padding:40px; border-radius:20px; text-align:center; box-shadow:0 10px 30px rgba(0,0,0,.2); } input{ width:100%; padding:15px; font-size:16px; box-sizing:border-box; } button{ margin-top:20px; padding:15px; width:100%; font-size:18px; cursor:pointer; } </style> </head> <body> <div class="card" id="pantallaInicial"> <h1>🎁 Descobreix el teu equip</h1> <p>Escriu el teu nom.</p> <input id="nom" placeholder="Nom i cognom"> <button onclick="descobrirEquip()"> Descobrir </button> </div> <div id="pantallaCarrega" style="display:none;"> <div class="card"> <h1>⏳</h1> <h2>Preparant el teu equip...</h2> <br> <p id="loadingText"> Verificant participant... </p> </div> </div> <script> function descobrirEquip(){ document.getElementById("pantallaInicial").style.display="none"; document.getElementById("pantallaCarrega").style.display="block"; } </script> </body> </html>
